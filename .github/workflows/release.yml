    runs-on: ubuntu-24.04-arm
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install CUDA Toolkit
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-8 build-essential cmake git
      - name: Build
        run: |
          export PATH=/usr/local/cuda-12.8/bin:$PATH
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="100" \
            -DGGML_CUDA_ENABLE_UNIFIED_MEMORY=1 \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc)
      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name
      - name: Pack artifacts
        run: |
          cp LICENSE ./build/bin/
          tar -czvf llama-${{ steps.tag.outputs.name }}-bin-linux-cuda12.8-DGXSpark-aarch64-sm100.tar.gz --transform "s,./,llama-${{ steps.tag.outputs.name }}/," -C ./build/bin .
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-linux-cuda12.8-DGXSpark-aarch64-sm100.tar.gz
          name: llama-bin-linux-cuda12.8-DGXSpark-aarch64-sm100.tar.gz

  # =============================== Release ============================

  release:
    if: ${{ ( github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') ) || github.event.inputs.create_release == 'true' }}

    permissions:
        contents: write

    runs-on: ubuntu-latest

    # Each job is independent; release only waits for them.
    # `needs:` does NOT require success — with `if: always() && contains(...)`
    # we could make release run even if some builds fail. For now we still
    # require all to succeed; flip this if partial releases are desired.
    needs:
      - windows-cuda-v100
      - windows-cuda-a100
      - windows-cuda-3090ti
      - windows-cuda-4090
      - windows-cuda-h100
      - windows-cuda-5090
      - linux-cuda-v100
      - linux-cuda-a100
      - linux-cuda-3090ti
      - linux-cuda-4090
      - linux-cuda-h100
      - linux-cuda-aarch64

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        run: |
          mkdir -p ./artifact/release
          mv ./artifact/*.tar.gz ./artifact/release/ 2>/dev/null || true
          mv ./artifact/*.zip ./artifact/release/ 2>/dev/null || true
          ls -la ./artifact/release/

      # Upload binaries to the LATEST existing semver release (e.g. v1.5.3).
      # The release itself is created manually by the maintainer; this workflow
      # only attaches freshly-built binaries. NEVER creates a new release or tag.
      - name: Find latest semver release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo ${{ github.repository }} --limit 20 --json tagName --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0]')
          if [ -z "$TAG" ]; then
            echo "ERROR: no semver release (v*.*.*) found — create one manually first with 'gh release create v1.x.y ...'"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Uploading to existing release: $TAG"

      - name: Upload binaries to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ./artifact/release
          gh release upload "${{ steps.latest.outputs.tag }}" * --repo ${{ github.repository }} --clobber
