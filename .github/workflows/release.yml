name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - master
      - main
    paths: [
      '.github/workflows/release.yml',
      '**/CMakeLists.txt',
      '**/.cmake',
      '**/*.h',
      '**/*.hpp',
      '**/*.c',
      '**/*.cpp',
      '**/*.cu',
      '**/*.cuh',
      '**/*.swift',
      '**/*.m',
      '**/*.metal',
      '**/*.comp',
      '**/*.glsl'
    ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

# =====================================================================
# TurboQuant release workflow — ONE INDEPENDENT JOB PER GPU/OS COMBO
# =====================================================================
# Do NOT collapse into a strategy:matrix. One failing GPU must not
# cancel the other 11 builds. User has been stuck for weeks on this.
# If you're editing this file after an upstream merge, back up first
# to ~/work/cuda_research/release_workflow_YYYYMMDD.yml.
# =====================================================================

jobs:
  # ======================= Windows CUDA builds ========================

  windows-cuda-v100:
    runs-on: windows-2022
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-V100-sm70
          variant: ccache
          evict-old-files: 1d
      - name: Install Cuda Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: '12.4'
      - name: Install Ninja
        run: choco install ninja
      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="70" ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            ${{ env.CMAKE_ARGS }}
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release -j %NINJA_JOBS%
      - name: Copy Cuda runtime into build
        shell: pwsh
        run: |
          $dst = '.\build\bin\Release\'
          # Try each possible location of CUDA runtime DLLs. Different CUDA versions
          # put them in different places: 11.x had bin\x64, 12.4+ uses bin\ directly.
          $paths = @(
            "${env:CUDA_PATH}\bin",
            "${env:CUDA_PATH}\bin\x64",
            "${env:CUDA_PATH}\lib\x64"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              robocopy $p $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
            }
          }
          # robocopy exit codes: 0-7 = success, 8+ = error. Normalize so PowerShell
          # does not fail the step on the "files copied" exit code (1).
          if ($LASTEXITCODE -lt 8) { $LASTEXITCODE = 0 }
      - name: Pack artifacts
        run: |
          cp LICENSE ./build/bin/Release/
          7z a -snl llama-bin-win-cuda12.4-V100-sm70.zip .\build\bin\Release\*
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-bin-win-cuda12.4-V100-sm70.zip
          name: llama-bin-win-cuda12.4-V100-sm70.zip

