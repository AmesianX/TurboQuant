name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - master
      - main
    paths: [
      '.github/workflows/release.yml',
      '**/CMakeLists.txt',
      '**/.cmake',
      '**/*.h',
      '**/*.hpp',
      '**/*.c',
      '**/*.cpp',
      '**/*.cu',
      '**/*.cuh',
      '**/*.swift',
      '**/*.m',
      '**/*.metal',
      '**/*.comp',
      '**/*.glsl'
    ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"
jobs:
  windows-cuda:
    runs-on: windows-2022

    strategy:
      matrix:
        include:
          # V100 (sm_70)
          - cuda: '12.4'
            cuda_arch: '70'
            gpu: 'V100-sm70'
          # A100 (sm_80)
          - cuda: '12.4'
            cuda_arch: '80'
            gpu: 'A100-sm80'
          # RTX 3090 Ti (sm_86)
          - cuda: '12.4'
            cuda_arch: '86'
            gpu: 'RTX3090Ti-sm86'
          # RTX 4090 (sm_89)
          - cuda: '12.4'
            cuda_arch: '89'
            gpu: 'RTX4090-sm89'
          # H100 (sm_90)
          - cuda: '12.4'
            cuda_arch: '90'
            gpu: 'H100-sm90'
          # RTX 5090 (sm_100/120, requires CUDA 13.1+)
          - cuda: '13.1'
            cuda_arch: '100;120'
            gpu: 'RTX5090-sm120'

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-${{ matrix.cuda }}
          variant: ccache
          evict-old-files: 1d

      - name: Install Cuda Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ matrix.cuda }}

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja

      - name: Build
        id: cmake_build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CUDA=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            %CMAKE_ARGS%
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release -j %NINJA_JOBS%

      - name: Copy Cuda runtime into build
        run: |
          $dst='.\build\bin\Release\'
          robocopy "${{env.CUDA_PATH}}\bin" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          robocopy "${{env.CUDA_PATH}}\lib" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          robocopy "${{env.CUDA_PATH}}\bin\x64" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/Release/
          7z a -snl llama-bin-win-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-bin-win-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.zip
          name: llama-bin-win-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.zip

  linux-cuda:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        include:
          - cuda: '12.8'
            image: 'nvidia/cuda:12.8.0-devel-ubuntu22.04'
            cuda_arch: '70'
            gpu: 'V100-sm70'
          - cuda: '12.8'
            image: 'nvidia/cuda:12.8.0-devel-ubuntu22.04'
            cuda_arch: '80'
            gpu: 'A100-sm80'
          - cuda: '12.8'
            image: 'nvidia/cuda:12.8.0-devel-ubuntu22.04'
            cuda_arch: '86'
            gpu: 'RTX3090Ti-sm86'
          - cuda: '12.8'
            image: 'nvidia/cuda:12.8.0-devel-ubuntu22.04'
            cuda_arch: '89'
            gpu: 'RTX4090-sm89'
          - cuda: '12.8'
            image: 'nvidia/cuda:12.8.0-devel-ubuntu22.04'
            cuda_arch: '90'
            gpu: 'H100-sm90'

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build with Docker
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            -e CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
            ${{ matrix.image }} \
            bash -c '
              set -e
              apt-get update && apt-get install -y build-essential cmake git
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_RPATH="\$ORIGIN" \
                -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
                -DGGML_NATIVE=OFF \
                -DGGML_CUDA=ON \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
                ${{ env.CMAKE_ARGS }}
              cmake --build build --config Release -j $(nproc)
              chown -R '"$(id -u)"':'"$(id -g)"' /workspace/build
            '

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts
        id: pack_artifacts
        run: |
          cp LICENSE ./build/bin/
          tar -czvf llama-${{ steps.tag.outputs.name }}-bin-linux-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.tar.gz --transform "s,./,llama-${{ steps.tag.outputs.name }}/," -C ./build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-linux-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.tar.gz
          name: llama-bin-linux-cuda${{ matrix.cuda }}-${{ matrix.gpu }}.tar.gz

  release:
    if: ${{ ( github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') ) || github.event.inputs.create_release == 'true' }}

    permissions:
        contents: write

    runs-on: ubuntu-latest

    needs:
      - windows-cuda
      - linux-cuda

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        id: move_artifacts
        run: |
          mkdir -p ./artifact/release
          mv ./artifact/*.tar.gz ./artifact/release/ 2>/dev/null || true
          mv ./artifact/*.zip ./artifact/release/ 2>/dev/null || true
          ls -la ./artifact/release/

      - name: Create release
        id: create_release
        uses: anzz1/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}

      - name: Upload release
        id: upload_release
        uses: actions/github-script@v3
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            for (let file of await fs.readdirSync('./artifact/release')) {
              if (path.extname(file) === '.gz' || path.extname(file) === '.zip') {
                console.log('uploadReleaseAsset', file);
                await github.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./artifact/release/${file}`)
                });
              }
            }
