  # ======================== Linux CUDA builds =========================

  linux-cuda-v100:
    runs-on: ubuntu-22.04
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build with Docker
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            nvidia/cuda:12.8.0-devel-ubuntu22.04 \
            bash -c '
              set -e
              apt-get update && apt-get install -y build-essential cmake git
              cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_RPATH="\$ORIGIN" \
                -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
                -DGGML_NATIVE=OFF \
                -DGGML_CUDA=ON \
                -DCMAKE_CUDA_ARCHITECTURES="70" \
                ${{ env.CMAKE_ARGS }}
              cmake --build build --config Release -j $(nproc)
              chown -R '"$(id -u)"':'"$(id -g)"' /workspace/build
            '
      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name
      - name: Pack artifacts
        run: |
          cp LICENSE ./build/bin/
          tar -czvf llama-${{ steps.tag.outputs.name }}-bin-linux-cuda12.8-V100-sm70.tar.gz --transform "s,./,llama-${{ steps.tag.outputs.name }}/," -C ./build/bin .
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-${{ steps.tag.outputs.name }}-bin-linux-cuda12.8-V100-sm70.tar.gz
