name: Build Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach binaries to (e.g. v1.3.0)'
        required: true
        default: 'v1.3.0'

permissions:
  contents: write

env:
  CUDA_ARCHITECTURES: "86;89;90;120"
  ROCM_GPU_TARGETS: "gfx90a;gfx942;gfx1030;gfx1100;gfx1151;gfx1200"

jobs:
  # ============================================================
  # Linux x64 + CUDA 12.8
  # ============================================================
  build-linux-x64-cuda128:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHITECTURES}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-x64-cuda-cu12.8"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-x64-cuda-cu12.8.zip \
            --clobber

  build-linux-x64-cuda128-standalone:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build (no OpenSSL)
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release -DLLAMA_OPENSSL=OFF \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHITECTURES}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-x64-cuda-cu12.8-standalone"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          echo "Built without OpenSSL — llama-server HTTPS is disabled." > $PKG/STANDALONE-NOTE.txt
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-x64-cuda-cu12.8-standalone.zip \
            --clobber

  # ============================================================
  # Linux arm64 + CUDA 12.8
  # ============================================================
  build-linux-arm64-cuda128:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHITECTURES}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-arm64-cuda-cu12.8"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-arm64-cuda-cu12.8.zip \
            --clobber

  build-linux-arm64-cuda128-standalone:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build (no OpenSSL)
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release -DLLAMA_OPENSSL=OFF \
            -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHITECTURES}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-arm64-cuda-cu12.8-standalone"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          echo "Built without OpenSSL — llama-server HTTPS is disabled." > $PKG/STANDALONE-NOTE.txt
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-arm64-cuda-cu12.8-standalone.zip \
            --clobber

  # ============================================================
  # Windows x64 + CUDA 12.8
  # ============================================================
  build-windows-x64-cuda128:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_CUDA_ARCHITECTURES="86;89;90;120"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          $PKG = "turboquant-bin-win-x64-cuda-cu12.8"
          New-Item -ItemType Directory -Path $PKG -Force
          Get-ChildItem build/bin/Release/*.exe | Copy-Item -Destination $PKG/ -ErrorAction SilentlyContinue
          Get-ChildItem build/bin/Release/*.dll | Copy-Item -Destination $PKG/ -ErrorAction SilentlyContinue
          Compress-Archive -Path $PKG -DestinationPath "$PKG.zip"
          # Separate cudart package (same as official llama.cpp)
          $CUDART = "cudart-turboquant-bin-win-cuda-cu12.8-x64"
          New-Item -ItemType Directory -Path $CUDART -Force
          $cudaPath = $env:CUDA_PATH
          if ($cudaPath) {
            Copy-Item "$cudaPath\bin\cudart64_12.dll" -Destination $CUDART/ -ErrorAction SilentlyContinue
            Copy-Item "$cudaPath\bin\cublas64_12.dll" -Destination $CUDART/ -ErrorAction SilentlyContinue
            Copy-Item "$cudaPath\bin\cublasLt64_12.dll" -Destination $CUDART/ -ErrorAction SilentlyContinue
          }
          Compress-Archive -Path $CUDART -DestinationPath "$CUDART.zip"

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} `
            turboquant-bin-win-x64-cuda-cu12.8.zip `
            cudart-turboquant-bin-win-cuda-cu12.8-x64.zip `
            --clobber

  build-windows-x64-cuda128-standalone:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: 'network'

      - name: Build (no OpenSSL)
        run: |
          cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release -DLLAMA_OPENSSL=OFF `
            -DCMAKE_CUDA_ARCHITECTURES="86;89;90;120"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        run: |
          $PKG = "turboquant-bin-win-x64-cuda-cu12.8-standalone"
          New-Item -ItemType Directory -Path $PKG -Force
          Get-ChildItem build/bin/Release/*.exe | Copy-Item -Destination $PKG/ -ErrorAction SilentlyContinue
          Get-ChildItem build/bin/Release/*.dll | Copy-Item -Destination $PKG/ -ErrorAction SilentlyContinue
          "Built without OpenSSL — llama-server HTTPS is disabled." | Out-File -FilePath "$PKG/STANDALONE-NOTE.txt"
          "Download cudart-turboquant-bin-win-cuda-cu12.8-x64.zip separately for CUDA runtime DLLs." | Out-File -FilePath "$PKG/CUDART-NOTE.txt"
          Compress-Archive -Path $PKG -DestinationPath "$PKG.zip"

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} `
            turboquant-bin-win-x64-cuda-cu12.8-standalone.zip `
            --clobber

  # ============================================================
  # Linux x64 + ROCm 7.2 (Docker-based)
  # ============================================================
  build-linux-x64-rocm72:
    runs-on: ubuntu-22.04
    container:
      image: rocm/dev-ubuntu-22.04:7.2.1-complete
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y cmake zip

      - name: Build
        run: |
          cmake -B build -DGGML_HIP=ON -DCMAKE_BUILD_TYPE=Release \
            -DGPU_TARGETS="${ROCM_GPU_TARGETS}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-x64-rocm-7.2"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-x64-rocm-7.2.zip \
            --clobber

  build-linux-x64-rocm72-standalone:
    runs-on: ubuntu-22.04
    container:
      image: rocm/dev-ubuntu-22.04:7.2.1-complete
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          apt-get update && apt-get install -y cmake zip

      - name: Build (no OpenSSL)
        run: |
          cmake -B build -DGGML_HIP=ON -DCMAKE_BUILD_TYPE=Release -DLLAMA_OPENSSL=OFF \
            -DGPU_TARGETS="${ROCM_GPU_TARGETS}"
          cmake --build build -j$(nproc)

      - name: Package
        run: |
          PKG="turboquant-bin-linux-x64-rocm-7.2-standalone"
          mkdir -p $PKG
          for bin in llama-cli llama-server llama-perplexity llama-bench \
                     llama-quantize llama-gguf-split llama-imatrix llama-tokenize; do
            cp build/bin/$bin $PKG/ 2>/dev/null || true
          done
          cp -P build/bin/lib*.so* $PKG/ 2>/dev/null || true
          echo "Built without OpenSSL — llama-server HTTPS is disabled." > $PKG/STANDALONE-NOTE.txt
          zip -r $PKG.zip $PKG/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.inputs.tag }} \
            turboquant-bin-linux-x64-rocm-7.2-standalone.zip \
            --clobber
